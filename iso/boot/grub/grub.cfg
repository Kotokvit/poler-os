# POLER-OS GRUB Configuration
# For i7-3770 + GTX 1060 HDMI + Smart TV 1920x1080

set timeout=5
set default=0

# Set graphics mode for HDMI output
# This tells GRUB to use VBE to set a video mode before loading kernel
# The framebuffer info is passed via multiboot info structure

menuentry "POLER-OS v0.3.0 — HDMI 1920x1080 (GTX 1060)" {
    set gfxpayload=1920x1080x32
    multiboot /boot/poler-os
    boot
}

menuentry "POLER-OS v0.3.0 — HDMI 1024x768 (safe mode)" {
    set gfxpayload=1024x768x32
    multiboot /boot/poler-os
    boot
}

menuentry "POLER-OS v0.3.0 — HDMI 640x480 (fallback)" {
    set gfxpayload=640x480x32
    multiboot /boot/poler-os
    boot
}

menuentry "POLER-OS v0.3.0 — Text mode (VGA only)" {
    set gfxpayload=text
    multiboot /boot/poler-os
    boot
}
