set timeout=0
set default=0

serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1

# Set VBE graphics mode for -vga std framebuffer
# This tells GRUB to switch to a VBE linear framebuffer mode before booting
# Without this, GRUB stays in VGA text mode and reports 0xB8000 as framebuffer
set gfxpayload=800x600x8
set gfxmode=800x600x8

# Use BOTH gfxterm (for VBE mode setup) and serial (for console output)
# This is the key: GRUB only sets VBE mode when gfxterm is active
terminal_input serial
terminal_output gfxterm serial

menuentry "POLER-OS v0.9.1 (64-bit, serial)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    insmod vbe
    insmod vga
    echo "Loading POLER-OS v0.9.1..."
    multiboot2 /boot/poler-os64
    boot
}

menuentry "POLER-OS v0.9.1 (64-bit, 32-bit framebuffer)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    insmod vbe
    insmod vga
    set gfxpayload=1024x768x32
    echo "Loading POLER-OS v0.9.1 (32-bit FB)..."
    multiboot2 /boot/poler-os64
    boot
}

menuentry "POLER-OS v0.9.1 (64-bit, text mode)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    set gfxpayload=text
    echo "Loading POLER-OS v0.9.1 (text mode)..."
    multiboot2 /boot/poler-os64
    boot
}
