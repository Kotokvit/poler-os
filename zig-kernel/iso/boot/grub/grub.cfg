set timeout=0
set default=0
serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input serial_console
terminal_output serial_console

menuentry "POLER-OS v0.9.1 (64-bit, serial)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    echo "Loading POLER-OS v0.9.1..."
    multiboot2 /boot/poler-os64
    boot
}

menuentry "POLER-OS v0.9.1 (64-bit, QEMU VT-d)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    echo "Loading POLER-OS v0.9.1 with IOMMU/VT-d..."
    multiboot2 /boot/poler-os64 iommu=on
    boot
}
