set timeout=0
set default=0

serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1

# Try to set VBE mode, but don't fail if unavailable
# This allows both -nographic (serial only) and -vga std (with FB) to work
if loadfont /boot/grub/fonts/unicode.pf2 ; then
  set gfxmode=1024x768x32
  set gfxpayload=1024x768x32
  insmod all_video
  insmod gfxterm
  terminal_output gfxterm serial
  terminal_input serial
else
  terminal_output serial
  terminal_input serial
fi

menuentry "POLER-OS v0.9.2 (64-bit)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    echo "Loading POLER-OS v0.9.2..."
    multiboot2 /boot/poler-os64
    boot
}

menuentry "POLER-OS v0.9.2 (800x600x8 FB)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    insmod vbe
    set gfxpayload=800x600x8
    echo "Loading POLER-OS (8-bit FB)..."
    multiboot2 /boot/poler-os64
    boot
}

menuentry "POLER-OS v0.9.2 (1024x768x32 FB)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    insmod vbe
    set gfxpayload=1024x768x32
    echo "Loading POLER-OS (32-bit FB)..."
    multiboot2 /boot/poler-os64
    boot
}

menuentry "POLER-OS v0.9.2 (text mode)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    set gfxpayload=text
    echo "Loading POLER-OS (text)..."
    multiboot2 /boot/poler-os64
    boot
}
