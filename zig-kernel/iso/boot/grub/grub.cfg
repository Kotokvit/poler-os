serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input serial
terminal_output serial

set timeout=1
set default=0

menuentry "POLER-OS v0.8.0 (64-bit)" {
    insmod multiboot2
    insmod part_msdos
    insmod elf
    echo "Loading POLER-OS v0.8.0..."
    multiboot2 /boot/poler-os64
    boot
}
